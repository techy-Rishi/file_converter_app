name: file_converter_app
description: A simple multi-format file converter app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # File picking
  file_picker: ^10.3.10
  path_provider: ^2.1.5

  # Image conversion (jpg, png, webp, bmp, gif)
  image: ^4.2.0

  # PDF creation / reading
  pdf: ^3.10.8
  syncfusion_flutter_pdf: ^25.1.35

  # Spreadsheet (xlsx/csv)
  excel: ^4.0.6
  csv: ^6.0.0

  # Audio/Video conversion removed - ffmpeg packages were causing build failures.
  # See STEPS.md for how to re-add this later if needed.

  # Word document (docx) reading/writing
  archive: ^3.6.1
  xml: ^6.5.0
  http: ^1.2.1

  # Sharing/saving result
  share_plus: ^10.1.4
  permission_handler: ^12.0.2

  # Ads (AdMob) - temporarily removed entirely (not just disabled in Dart)
  # to test whether the native AdMob library itself is causing a startup
  # crash via its own auto-initializing Android components.
  # google_mobile_ads: ^7.0.0

  # Contact/feedback email link
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
