name: file_converter_app
description: A simple multi-format file converter app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # File picking
  file_picker: ^8.0.0
  path_provider: ^2.1.3

  # Image conversion (jpg, png, webp, bmp, gif)
  image: ^4.2.0

  # PDF creation / reading
  pdf: ^3.10.8
  syncfusion_flutter_pdf: ^25.1.35

  # Spreadsheet (xlsx/csv)
  excel: ^4.0.6
  csv: ^6.0.0

  # Audio/Video conversion (mp3, mp4, wav, etc.) - maintained fork, original was discontinued
  ffmpeg_kit_flutter_new: ^4.4.0

  # Word document (docx) reading/writing
  archive: ^3.6.1
  xml: ^6.5.0
  http: ^1.2.1

  # Sharing/saving result
  share_plus: ^9.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
