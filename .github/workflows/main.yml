name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Regenerate Android platform files (always fresh, avoids version mismatches)
        run: |
          rm -rf android
          flutter create . --platforms=android

      - name: Force compileSdk 36 globally (affects app AND all plugins like file_picker)
        run: |
          echo "flutter.compileSdkVersion=36" >> android/gradle.properties
          echo "flutter.targetSdkVersion=36" >> android/gradle.properties
          echo "systemProp.http.connectionTimeout=90000" >> android/gradle.properties
          echo "systemProp.http.socketTimeout=90000" >> android/gradle.properties
          echo "org.gradle.internal.repository.max.retries=5" >> android/gradle.properties
          echo "org.gradle.internal.repository.initial.backoff=1000" >> android/gradle.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK (unsigned)
        run: flutter build apk --release

      - name: Build release AAB (for Play Store, unsigned)
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
