name: Build Flutter APK

on:
  workflow_dispatch:   # lets you trigger it manually with a button
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'   # always use latest stable, keeps Android tooling compatible

      - name: Regenerate Android platform files (always fresh, avoids version mismatches)
        run: |
          rm -rf android
          flutter create . --platforms=android

      - name: Set app name and add AdMob App ID to AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="file_converter_app"/android:label="ConvertKaro"/' "$MANIFEST"
          sed -i $'s#</application>#    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"/>\n    </application>#' "$MANIFEST"
          grep -q 'APPLICATION_ID' "$MANIFEST" && echo "AdMob App ID inserted OK" || (echo "FAILED to insert AdMob App ID" && exit 1)
          grep -q 'ConvertKaro' "$MANIFEST" && echo "App name set OK" || (echo "FAILED to set app name" && exit 1)
          cat "$MANIFEST"

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app launcher icon
        run: dart run flutter_launcher_icons

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK (unsigned)
        run: flutter build apk --release

      - name: Build release AAB (for Play Store, unsigned)
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Set app name and add AdMob App ID to AndroidManifest
        run: python3 scripts/patch_manifest.py
